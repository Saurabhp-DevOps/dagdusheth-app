name: CI Pipeline

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: arn:aws:iam::984124409676:role/GitHubECRPushRole
          aws-region: ap-south-1

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin 984124409676.dkr.ecr.ap-south-1.amazonaws.com

      - name: Build Docker Image
        run: |
          docker build -t dagdusheth-app .

      - name: Tag Image
        run: |
          docker tag dagdusheth-app:latest 984124409676.dkr.ecr.ap-south-1.amazonaws.com/dagdusheth-app:latest

      - name: Push to ECR
        run: |
          docker push 984124409676.dkr.ecr.ap-south-1.amazonaws.com/dagdusheth-app:latest