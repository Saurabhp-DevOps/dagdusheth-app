name: CI Pipeline

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  build:
    name: Build and Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      # SonarQube Scan
      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      # Configure AWS Credentials using OIDC
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::984124409676:role/GitHubActionsECRRole
          aws-region: ap-south-1

      # Login to Amazon ECR
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      # Build Docker Image
      - name: Build Docker Image
        run: |
          docker build -t dagdusheth-app .

      # Tag Docker Image
      - name: Tag Docker Image
        run: |
          docker tag dagdusheth-app:latest 984124409676.dkr.ecr.ap-south-1.amazonaws.com/dagdusheth-app:latest

      # Push Image to ECR
      - name: Push Docker Image
        run: |
          docker push 984124409676.dkr.ecr.ap-south-1.amazonaws.com/dagdusheth-app:latest